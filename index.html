<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude API – file:// Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a6a;
      --text: #e8e8f0;
      --muted: #666680;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'Space Mono', monospace;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      padding: 12px 16px;
      resize: none;
      height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      align-self: flex-end;
      transition: transform 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .dot.active { background: #4ade80; animation: pulse 1.2s infinite; }
    .dot.error { background: var(--accent2); }

    .response-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 100px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      transition: border-color 0.3s;
    }

    .response-box.has-content { border-color: var(--accent); }

    .response-box.error-state {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .placeholder-text {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      text-align: center;
      padding: 20px 0;
    }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-16px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">FILE:// PROTOCOL TEST</div>
    <h1>Claude <span>API</span> Test</h1>
    <p class="subtitle">Kaam karega ya CORS block karega?</p>
  </div>

  <div class="card">
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span id="statusText">Ready — Koi sawaal poochho</span>
    </div>

    <div class="input-row">
      <textarea id="question" placeholder="Yahan apna sawaal likho...&#10;e.g. India ki rajdhani kya hai?"></textarea>
      <button id="askBtn" onclick="askClaude()">Poochho ↗</button>
    </div>

    <div class="response-box" id="responseBox">
      <div class="placeholder-text">⬆ Sawaal likho aur poochho — response yahan aayega</div>
    </div>
  </div>
</div>

<script>
  async function askClaude() {
    const question = document.getElementById('question').value.trim();
    if (!question) return;

    const btn = document.getElementById('askBtn');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');
    const responseBox = document.getElementById('responseBox');

    // Loading state
    btn.disabled = true;
    dot.className = 'dot active';
    statusText.textContent = 'Claude se pooch raha hoon...';
    responseBox.className = 'response-box';
    responseBox.innerHTML = '<span class="loader"></span> Soch raha hoon...';

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [
            {
              role: "user",
              content: question
            }
          ]
        })
      });

      const data = await response.json();

      if (data.content && data.content[0]) {
        const answer = data.content[0].text;
        responseBox.className = 'response-box has-content';
        responseBox.textContent = answer;
        dot.className = 'dot active';
        statusText.textContent = '✓ Response mil gaya!';
      } else if (data.error) {
        throw new Error(data.error.message || 'API Error');
      } else {
        throw new Error('Unexpected response format');
      }

    } catch (err) {
      responseBox.className = 'response-box error-state';
      responseBox.textContent = `❌ ERROR:\n${err.message}\n\nYeh CORS block ho sakta hai (file:// protocol issue) ya session active nahi hai.\n\nTry: Claude.ai me login karke dobara run karo.`;
      dot.className = 'dot error';
      statusText.textContent = 'Error aaya — neeche dekho';
    } finally {
      btn.disabled = false;
    }
  }

  // Enter key support
  document.getElementById('question').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      askClaude();
    }
  });
</script>

</body>
</html>
